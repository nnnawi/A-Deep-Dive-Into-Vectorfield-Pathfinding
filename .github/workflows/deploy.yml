name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "vectorfield-blogpost/package-lock.json"

      - name: Install dependencies
        working-directory: vectorfield-blogpost
        run: npm ci

      - name: Build site
        working-directory: vectorfield-blogpost
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: vectorfield-blogpost/dist

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./vectorfield-blogpost/dist
          cname: false
